# Dependabot — automated dependency update PRs.
# Security alerts/updates additionally require "Dependabot alerts" enabled in
# repo Settings → Code security (a GitHub setting, not this file).
version: 2
updates:
  # Backend Python deps (pyproject.toml).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-dependencies:
        patterns: ["*"]

  # Frontend Node deps.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend-dependencies:
        patterns: ["*"]

  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
